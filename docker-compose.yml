services:
  postgres:
    image: postgres:16-alpine
    container_name: fitbook-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-fitbook_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fitbook_password}
      POSTGRES_DB: ${DB_NAME:-fitbook_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-fitbook_user} -d ${DB_NAME:-fitbook_db}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitbook-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitbook-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-fitbook_user}:${DB_PASSWORD:-fitbook_password}@postgres:5432/${DB_NAME:-fitbook_db}
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - fitbook-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitbook-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fitbook-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local

networks:
  fitbook-network:
    driver: bridge

