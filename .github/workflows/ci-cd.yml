name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

concurrency:
  group: fitbook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # BACKEND TESTS WITH MONGODB REPLICA SET
  # =========================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start MongoDB replica set
        run: |
          docker run -d \
            --name mongo-ci \
            -p 27017:27017 \
            mongo:8.0 \
            --replSet rs0 \
            --bind_ip_all

          echo "Waiting for MongoDB..."

          for i in {1..60}; do
            if docker exec mongo-ci mongosh \
              --quiet \
              --eval 'db.adminCommand({ ping: 1 }).ok' |
              grep -q 1; then

              echo "MongoDB is reachable."
              break
            fi

            if [ "$i" -eq 60 ]; then
              echo "MongoDB did not start."
              docker logs mongo-ci
              exit 1
            fi

            sleep 2
          done

          echo "Initializing replica set..."

          docker exec mongo-ci mongosh \
            --quiet \
            --eval '
              rs.initiate({
                _id: "rs0",
                members: [
                  {
                    _id: 0,
                    host: "localhost:27017"
                  }
                ]
              })
            '

          echo "Waiting for PRIMARY..."

          for i in {1..60}; do
            if docker exec mongo-ci mongosh \
              --quiet \
              --eval 'db.hello().isWritablePrimary' |
              grep -q true; then

              echo "MongoDB PRIMARY is ready."
              exit 0
            fi

            if [ "$i" -eq 60 ]; then
              echo "MongoDB PRIMARY election failed."
              docker logs mongo-ci
              exit 1
            fi

            sleep 2
          done

      - name: Run backend tests
        working-directory: backend
        env:
          TEST_MONGODB_URI: mongodb://localhost:27017/?replicaSet=rs0
          TEST_MONGO_DB_NAME: fitbook_test_db
          MONGODB_URI: mongodb://localhost:27017/?replicaSet=rs0
          MONGO_DB_NAME: fitbook_test_db
          DEBUG: "False"
        run: pytest -v

      - name: Show MongoDB logs after failure
        if: failure()
        run: docker logs mongo-ci || true

  # =========================================================
  # FRONTEND BUILD TEST
  # =========================================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # =========================================================
  # BUILD, PUSH AND UPDATE KUBERNETES MANIFESTS
  # =========================================================
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    needs:
      - test-backend
      - test-frontend

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fitbook-backend
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fitbook-frontend

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes image tags
        run: |
          sed -i -E \
            "s|^([[:space:]]*)image: .*fitbook-backend.*|\1image: ${BACKEND_IMAGE}:${GITHUB_SHA}|" \
            kubernetes/backend-deployment.yaml

          sed -i -E \
            "s|^([[:space:]]*)image: .*fitbook-frontend.*|\1image: ${FRONTEND_IMAGE}:${GITHUB_SHA}|" \
            kubernetes/frontend-deployment.yaml

          sed -i \
            "s|imagePullPolicy: Never|imagePullPolicy: IfNotPresent|g" \
            kubernetes/backend-deployment.yaml

          sed -i \
            "s|imagePullPolicy: Never|imagePullPolicy: IfNotPresent|g" \
            kubernetes/frontend-deployment.yaml
          sed -i -E \
            "s|^([[:space:]]*)image: .*fitbook-backend.*|\1image: ${BACKEND_IMAGE}:${GITHUB_SHA}|" \
            kubernetes/mongodb-seed-job.yaml

          echo "Updated backend image:"
          grep "image:" kubernetes/backend-deployment.yaml
          
          echo "Updated frontend image:"
          grep "image:" kubernetes/frontend-deployment.yaml

      - name: Commit updated Kubernetes manifests
        run: |
          if git diff --quiet; then
            echo "No Kubernetes image changes."
            exit 0
          fi
      
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add \
            kubernetes/backend-deployment.yaml \
            kubernetes/frontend-deployment.yaml \
            kubernetes/mongodb-seed-job.yaml
            
          git commit \
            -m "Deploy images ${GITHUB_SHA} [skip ci]"
          
          git pull --rebase origin main
          git push origin main