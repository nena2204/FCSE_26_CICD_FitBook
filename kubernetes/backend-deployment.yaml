apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fitbook
  labels:
    app: backend

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: nennaa/fitbook-backend:0522f01b8719ff80049b5f36a26298a86177ed5d
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: fitbook-mongodb-secret
                  key: MONGODB_URI

            - name: MONGO_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fitbook-config
                  key: MONGO_DB_NAME

            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: fitbook-config
                  key: DEBUG

            - name: PYTHONUNBUFFERED
              value: "1"

          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: fitbook
  labels:
    app: backend

spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fitbook
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
